name: Release-Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version
        required: false
        default: dev

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
            qt_host: windows
            qt_arch: win64_msvc2022_64

          - os: ubuntu-22.04
            platform: linux
            qt_host: linux
            qt_arch: linux_gcc_64
            

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          version: '6.8.3'

      - name: Configure
        run: >
          cmake
          -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          "-DAPP_VERSION=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build --config Release --target CubedLauncher

      ####################################################################
      # Windows
      ####################################################################

      - name: Deploy Qt
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          windeployqt --release --qmldir qml build\CubedLauncher\CubedLauncher.exe

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          iscc /DCubedLauncherVersion=${{ steps.version.outputs.version }} installer\installer.iss

      - name: Create Portable Zip
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/CubedLauncher* `
            -DestinationPath CubedLauncher-${{ steps.version.outputs.version }}-windows-x64-portable.zip

      ####################################################################
      # Linux
      ####################################################################

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y \
            fuse \
            libfuse2 \
            desktop-file-utils

      - name: Install GCC 13 (for C++23)
        if: matrix.platform == 'linux'
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt update
          sudo apt install gcc-13 g++-13 -y
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100 \
                                  --slave /usr/bin/g++ g++ /usr/bin/g++-13


      - name: Install App
        if: matrix.platform == 'linux'
        run: |
          cmake --install build --prefix AppDir/usr

      - name: Download linuxdeployqt
        if: matrix.platform == 'linux'
        run: |
          wget https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage

      - name: Build AppImage
        if: matrix.platform == 'linux'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          export ARCH=x86_64

          ./linuxdeployqt-continuous-x86_64.AppImage \
            AppDir/usr/share/applications/CubedLauncher.desktop \
            -appimage

      ####################################################################
      # Upload
      ####################################################################

      - name: Upload Windows Artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            installer/output/*.exe
            *.zip

      - name: Upload Linux Artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            *.AppImage

  ##########################################################################
  # Release
  ##########################################################################

  release:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256
        run: |
          cd artifacts

          find . -type f | while read file
          do
            sha256sum "$file"
          done > SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false