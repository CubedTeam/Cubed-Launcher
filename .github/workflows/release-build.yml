name: Release-Build

on:
  workflow_dispatch:
    inputs:
        version:
            description: "Version"
            required: false
            default: "dev"

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:

    runs-on: windows-2022

    steps:

      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Get Version
        id: version
        shell: bash
        run: |
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            else
            VERSION="${{ github.event.inputs.version }}"
            fi

            echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: >
            cmake
            -B build
            -G Ninja
            -DCMAKE_BUILD_TYPE=Release
            "-DAPP_VERSION=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build --config Release --target CubedLauncher

      - name: Deploy Qt
        shell: cmd
        run: |
            windeployqt --release --qmldir qml build\CubedLauncher\CubedLauncher.exe
    
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        shell: cmd
        run: |
            iscc /DCubedLauncherVersion=${{ steps.version.outputs.version }} installer\installer.iss

      - name: Create Portable Zip
        run: |
            Compress-Archive `
            -Path build/CubedLauncher* `
            -DestinationPath CubedLauncher-${{ steps.version.outputs.version }}-windows-x64-portable.zip

      - name: Generate SHA256
        shell: powershell
        run: |
          Get-FileHash installer/output/*.exe -Algorithm SHA256 |
            ForEach-Object {
              "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)"
            } |
            Out-File installer/output/SHA256SUMS -Encoding ascii

          Get-FileHash *.zip -Algorithm SHA256 |
            ForEach-Object {
              "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)"
            } |
            Out-File installer/output/SHA256SUMS -Append -Encoding ascii

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
            files: |
                installer/output/*.exe
                installer/output/SHA256SUMS
                *.zip
                generate_release_notes: true
                draft: false
                prerelease: false
