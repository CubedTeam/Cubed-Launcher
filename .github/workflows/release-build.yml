name: Release-Build

on:
  workflow_dispatch:
    inputs:
        version:
            description: "Version"
            required: false
            default: "dev"

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:

    runs-on: windows-2022

    steps:

      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Get Version
        id: version
        shell: bash
        run: |
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            else
            VERSION="${{ github.event.inputs.version }}"
            fi

            echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt via aqt (With Mirror)
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          
          python -m aqt install-qt windows desktop 6.11.1 win64_msvc2022_64 --outputdir D:\Qt --mirror https://mirrors.tuna.tsinghua.edu.cn/qt
          
          echo "D:\Qt\6.11.1\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        run: >
            cmake
            -B build
            -G "Visual Studio 17 2022"
            -A x64
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_PREFIX_PATH=D:/Qt/6.11.1/msvc2022_64
            -DAPP_VERSION=${{ steps.version.outputs.version }}

      - name: Build
        run: cmake --build build --config Release --target CubedLauncher

      - name: Deploy Qt
        shell: cmd
        run: |
            windeployqt --release --qmldir qml build\CubedLauncher\CubedLauncher.exe
    
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        shell: cmd
        run: |
            iscc /DCubedLauncherVersion=${{ steps.version.outputs.version }} installer\installer.iss

      - name: Create Portable Zip
        run: |
            Compress-Archive `
            -Path build/CubedLauncher/* `
            -DestinationPath CubedLauncher-${{ steps.version.outputs.version }}-windows-x64-portable.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
            files: |
                installer/output/*.exe
                *.zip
                generate_release_notes: true
                draft: false
                prerelease: false
